<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Kyou Chan Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a09;
      --card-bg: rgba(22, 22, 19, 0.65);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f2f2f0;
      --text-muted: #9e9e98;
      --accent-primary: #00F0FF;
      --accent-secondary: #6366f1;
      --error-color: #f43f5e;
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: var(--font-sans);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow circles */
    .glow-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      z-index: 1;
      opacity: 0.15;
    }

    .glow-1 {
      top: -10%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: var(--accent-primary);
    }

    .glow-2 {
      bottom: -10%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: var(--accent-secondary);
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
      transition: border-color 0.3s ease;
    }

    .login-card:hover {
      border-color: rgba(0, 240, 255, 0.25);
    }

    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 12px;
      background: rgba(0, 240, 255, 0.08);
      border: 1px solid rgba(0, 240, 255, 0.2);
      margin-bottom: 24px;
    }

    .logo-container svg {
      color: var(--accent-primary);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="email"], input[type="password"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    input[type="email"]:focus, input[type="password"]:focus {
      border-color: var(--accent-primary);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1);
    }

    .error-message {
      background: rgba(244, 63, 94, 0.08);
      border: 1px solid rgba(244, 63, 94, 0.2);
      border-radius: 8px;
      padding: 12px;
      color: var(--error-color);
      font-size: 13px;
      margin-bottom: 24px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .submit-btn {
      width: 100%;
      background: var(--accent-primary);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .submit-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 240, 255, 0.25);
    }

    .submit-btn:active {
      transform: none;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body>

  <div class="glow-circle glow-1" aria-hidden="true"></div>
  <div class="glow-circle glow-2" aria-hidden="true"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-container">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>

      <h1>System Administration</h1>
      <p class="subtitle">Enter administrative key to unlock dashboard</p>

      <form method="POST" action="/admin">
        {{if .Error}}
        <div class="error-message">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span>{{.Error}}</span>
        </div>
        {{end}}

        <div class="form-group">
          <label for="email">Security Email</label>
          <input type="email" id="email" name="email" required placeholder="admin@najinkyou.com" autofocus>
        </div>

        <div class="form-group">
          <label for="password">Security Password</label>
          <input type="password" id="password" name="password" required placeholder="••••••••••••••••">
        </div>

        <button type="submit" class="submit-btn">
          Verify Credentials
        </button>
      </form>

      <a href="/" class="back-link">← Return to Portfolio</a>
    </div>
  </div>

</body>
</html>
